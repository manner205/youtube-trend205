name: 스케줄 자동 발송

on:
  schedule:
    # 매 시간 정각과 30분에 실행 (UTC 기준)
    # 한국 시간 = UTC+9 이므로 한국 오후 8시 = UTC 11시
    - cron: '0,30 * * * *'
  workflow_dispatch:  # GitHub에서 수동 실행 가능

jobs:
  check-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: 스케줄 확인 및 리포트 실행
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          python3 << 'EOF'
          import json
          import sys
          import os
          import urllib.request
          import urllib.error
          from datetime import datetime, timezone, timedelta

          RENDER_URL = os.environ['RENDER_URL'].rstrip('/')

          # ── Render 서버 깨우기 + 스케줄 조회 ──────────────────────────────
          # 무료 플랜은 슬립 상태에서 첫 응답이 최대 50초 걸릴 수 있어
          config = None
          for attempt in range(3):
              try:
                  print(f"서버 조회 시도 {attempt+1}/3...")
                  req = urllib.request.Request(f"{RENDER_URL}/api/schedule")
                  with urllib.request.urlopen(req, timeout=120) as resp:
                      config = json.loads(resp.read().decode())
                  print(f"스케줄 조회 완료: {config}")
                  break
              except Exception as e:
                  print(f"실패: {e}")
                  if attempt < 2:
                      import time; time.sleep(30)

          if config is None:
              print("서버 응답 없음 — 오늘 실행 건너뜀")
              sys.exit(0)

          # ── 자동 발송 활성화 여부 확인 ────────────────────────────────────
          if not config.get('enabled', False):
              print("자동 발송 비활성화 상태 — 종료")
              sys.exit(0)

          # ── 현재 한국 시간 계산 ───────────────────────────────────────────
          KST = timezone(timedelta(hours=9))
          now = datetime.now(KST)
          # strftime %a → Mon, Tue, Wed, Thu, Fri, Sat, Sun
          current_day = now.strftime('%a').lower()  # mon, tue, wed...
          current_time_str = now.strftime('%H:%M')

          scheduled_days = config.get('days', [])
          scheduled_time = config.get('time', '20:00')
          topics = config.get('topics', [])

          print(f"현재 시각: {current_day} {current_time_str} KST")
          print(f"발송 설정: {scheduled_days} {scheduled_time}")

          # ── 요일 확인 ─────────────────────────────────────────────────────
          if current_day not in scheduled_days:
              print(f"오늘({current_day})은 발송 요일 아님 — 종료")
              sys.exit(0)

          # ── 시간 확인 (설정 시간 ±14분 이내) ─────────────────────────────
          # GitHub Actions cron은 30분 간격이므로 14분 창으로 중복 실행 방지
          sched_h, sched_m = map(int, scheduled_time.split(':'))
          sched_dt = now.replace(hour=sched_h, minute=sched_m, second=0, microsecond=0)
          diff_min = abs((now - sched_dt).total_seconds()) / 60

          print(f"예정 시각과 차이: {diff_min:.1f}분")
          if diff_min > 14:
              print("발송 시간 아님 — 종료")
              sys.exit(0)

          # ── 리포트 실행 요청 ──────────────────────────────────────────────
          print(f"리포트 실행 시작! 주제: {topics}")
          payload = json.dumps({"topics": topics, "send_email": True}).encode()
          req = urllib.request.Request(
              f"{RENDER_URL}/api/run",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=60) as resp:
              result = json.loads(resp.read().decode())
          print(f"실행 시작 완료: {result}")
          print("이메일은 파이프라인 완료 후 자동 발송됩니다.")
          EOF
